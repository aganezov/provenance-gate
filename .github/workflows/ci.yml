name: CI

# Lean gate: uv sync (locked) -> ruff -> pytest (gate + eval package) -> Node boundary tests.
# The two Python suites have separate rootdirs (each pyproject sets testpaths=["tests"]), so the
# eval package is run from its own directory. Correctness lives in unit/integration tests; demos
# are a discipline, not a CI gate. Kept deliberately small.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up uv (+ Python 3.13)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          python-version: "3.13"

      - name: Set up Node 22
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
          package-manager-cache: false

      - name: Install (exact versions, from uv.lock)
        # --locked fails if uv.lock is out of sync with pyproject.toml, so the
        # committed lock is verified on every run.
        run: uv sync --locked

      - name: Ruff lint
        run: uv run ruff check .

      - name: Gate tests (Python)
        run: uv run pytest

      - name: Eval-package tests (Python)
        # Its own rootdir/testpaths — not collected by the root run above.
        working-directory: evals/claude-science-rollouts
        run: uv run pytest

      - name: Install browser-boundary dependencies
        working-directory: evals/claude-science-rollouts/browser
        run: npm ci --ignore-scripts

      - name: Node browser-boundary tests
        working-directory: evals/claude-science-rollouts/browser
        run: npm test
